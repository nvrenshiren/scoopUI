<!doctype html>
<!--
  P02 · 语言选择页(首次启动)· HTML 原型
  设计系统 v2:docs/design/systems/web.md(暗色默认 · run-green · Space Grotesk/DM Sans/JetBrains Mono)
  设计提示词:docs/design/prompts/web/scoop-gui/P02-语言选择页.md
  真相源(结构与文案均以此为准):src/pages/LanguagePick.tsx

  说明:
  - 纯静态展示,无真实交互逻辑;两张语言卡片的 hover/focus-visible 效果由纯 CSS 驱动,
    用于演示设计系统 §7"微光"与 §9"键盘聚焦环"硬约束,不代表真实点击后的路由跳转。
  - 真实组件里点击任一语言卡片会立即调用 chooseLanguage(),没有独立的"确认"按钮或
    二次弹窗——选择动作本身就是确认,因此本原型也不提供额外的确认控件。
  - 已知差异①:设计系统 §4 把"首启页大标题"定义为 text-4xl(36px),但真实组件用的是
    自定义 32px;本原型按真实实现的 32px 还原,不采用文档里的 36px。
  - 已知差异②:src/i18n.ts 里定义了 lang.title/lang.subtitle/lang.zh/lang.en 四个词条,
    但真实组件从未调用 t()/tf(),这四个词条是死码;本原型的文案取自组件字面量,
    与字典值不完全一致(字典仅供参考,不是本页文案来源)。
  - 窗口默认 1280×800、最小 1024×600(design-system §9 / tauri.conf.json);
    本页内容水平垂直居中,不做栅格拉伸。
-->
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>P02 · 语言选择页 · Scoop GUI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ============================================================
         设计系统 v2 token(docs/design/systems/web.md §2 / §4 / §6 / §7 / §11.1)
         暗色为默认与主推;亮色作为备选覆盖(:root.light),本原型默认不套用。
         ============================================================ */
      :root {
        /* ---- §2 色板 · Dark(默认) ---- */
        --color-bg: oklch(0.13 0.02 250);
        --color-bg-elevated: oklch(0.17 0.02 250);
        --color-bg-overlay: oklch(0.2 0.02 250);
        --surface-glass: oklch(0.22 0.02 250 / 0.6);
        --color-fg: oklch(0.96 0.005 250);
        --color-fg-muted: oklch(0.72 0.01 250);
        --color-fg-subtle: oklch(0.55 0.01 250);
        --color-border: oklch(0.3 0.01 250);
        --color-border-strong: oklch(0.45 0.01 250);
        --color-primary: oklch(0.72 0.18 145);
        --color-primary-hover: oklch(0.76 0.18 145);
        --primary-glow: oklch(0.72 0.18 145 / 0.25);
        --color-accent: oklch(0.7 0.16 250);
        --accent-glow: oklch(0.7 0.16 250 / 0.25);
        --color-warning: oklch(0.8 0.16 80);
        --color-destructive: oklch(0.65 0.22 25);
        --destructive-glow: oklch(0.65 0.22 25 / 0.2);
        --color-success: oklch(0.72 0.18 145);
        --color-ring: oklch(0.72 0.18 145);

        /* ---- §4 字体 ---- */
        --font-heading: "Space Grotesk", system-ui, sans-serif;
        --font-body: "DM Sans", system-ui, sans-serif;
        --font-mono: "JetBrains Mono", "Cascadia Code", Consolas, monospace;

        /* ---- §6 圆角 ---- */
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --radius-xl: 16px;
        --radius-full: 9999px;

        /* ---- §7 阴影与微光 ---- */
        --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.5), 0 2px 4px -2px rgb(0 0 0 / 0.4);
        --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.6), 0 4px 6px -4px rgb(0 0 0 / 0.4);
        --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.7), 0 8px 10px -6px rgb(0 0 0 / 0.5);
        --glow-primary: 0 0 20px var(--primary-glow), 0 0 40px var(--primary-glow);
        --ring-primary: 0 0 0 1px var(--color-primary), 0 0 0 4px var(--primary-glow);
      }

      /* ---- §3 色板 · Light(备选,本原型默认不启用,仅作文档完整性保留) ---- */
      :root.light {
        --color-bg: oklch(0.99 0.005 250);
        --color-bg-elevated: oklch(1 0 0);
        --color-bg-overlay: oklch(0.96 0.005 250);
        --color-fg: oklch(0.18 0.02 250);
        --color-fg-muted: oklch(0.45 0.01 250);
        --color-fg-subtle: oklch(0.6 0.01 250);
        --color-border: oklch(0.88 0.01 250);
        --color-border-strong: oklch(0.75 0.01 250);
        --color-primary: oklch(0.55 0.18 145);
        --primary-glow: oklch(0.55 0.18 145 / 0.18);
      }

      * {
        box-sizing: border-box;
        border-color: var(--color-border);
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        background: var(--color-bg);
        color: var(--color-fg);
        font-family: var(--font-body);
        font-size: 14px;
        line-height: 1.5;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }
      h1 {
        font-family: var(--font-heading);
        line-height: 1.2;
        margin: 0;
      }
      p {
        margin: 0;
      }
      button {
        font: inherit;
        color: inherit;
        appearance: none;
        background: none;
      }

      /* ============================================================
         §2.1 / §11.2 科技感叠加工具类
         ============================================================ */
      .bg-grid {
        background-image: linear-gradient(to right, oklch(0.3 0.01 250 / 0.08) 1px, transparent 1px),
          linear-gradient(to bottom, oklch(0.3 0.01 250 / 0.08) 1px, transparent 1px);
        background-size: 32px 32px;
      }
      .bg-glow-top {
        background: radial-gradient(ellipse 800px 200px at 50% -50%, var(--primary-glow), transparent);
      }

      /* ============================================================
         页面结构(逐一对应 src/pages/LanguagePick.tsx)
         ============================================================ */
      .lang-pick {
        position: relative;
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
      }
      .lang-pick__glow {
        position: absolute;
        inset: 0 0 60% 0;
        pointer-events: none;
      }
      .lang-pick__content {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 48px;
      }

      .icon-badge {
        margin-bottom: 20px;
        display: flex;
        height: 64px;
        width: 64px;
        align-items: center;
        justify-content: center;
        border-radius: var(--radius-xl);
        border: 1px solid var(--primary-glow);
        background: var(--color-bg-elevated);
        color: var(--color-primary);
        box-shadow: 0 0 24px var(--primary-glow);
      }

      /* 首启页大标题:真实实现为自定义 32px,与 design-system §4 的 text-4xl(36px)
         条款存在已知差异,详见文件头注释与本目录旁的设计提示词/验收文档。 */
      .brand-title {
        font-size: 32px;
        font-weight: 700;
      }

      .subtitle {
        margin-top: 12px;
        color: var(--color-fg-muted);
        font-size: 14px;
      }
      .hint {
        margin-top: 6px;
        color: var(--color-fg-subtle);
        font-size: 12px;
      }

      .options {
        margin-top: 36px;
        display: flex;
        gap: 16px;
      }

      .option {
        position: relative;
        display: flex;
        width: 220px;
        cursor: pointer;
        flex-direction: column;
        align-items: flex-start;
        gap: 2px;
        border-radius: var(--radius-lg);
        border: 1px solid var(--color-border);
        background: var(--color-bg-elevated);
        padding: 20px;
        text-align: left;
        transition: all 0.15s ease;
      }
      .option:hover {
        transform: translateY(-2px);
        border-color: var(--color-primary);
        box-shadow: 0 0 0 1px var(--color-primary), 0 0 20px var(--primary-glow);
      }
      .option:focus {
        outline: none;
      }
      .option:focus-visible {
        transform: translateY(-2px);
        border-color: var(--color-primary);
        box-shadow: var(--ring-primary);
      }
      .option__main {
        font-family: var(--font-heading);
        font-size: 20px;
        font-weight: 600;
      }
      .option__sub {
        font-size: 13px;
        color: var(--color-fg-muted);
      }
      .option__chevron {
        position: absolute;
        right: 16px;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        color: var(--color-fg-subtle);
        transition: color 0.15s ease;
      }
      .option:hover .option__chevron,
      .option:focus-visible .option__chevron {
        color: var(--color-primary);
      }
    </style>
  </head>
  <body>
    <div class="lang-pick bg-grid">
      <div class="lang-pick__glow bg-glow-top"></div>

      <div class="lang-pick__content">
        <div class="icon-badge" aria-hidden="true">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="4 17 10 11 4 5"></polyline>
            <line x1="12" y1="19" x2="20" y2="19"></line>
          </svg>
        </div>

        <h1 class="brand-title">Scoop GUI</h1>

        <!-- 首次选择前无语言偏好,双语并列呈现(此页即语言选择本身);
             与产品内其它页面"当前语言单语言展示"的规则不同,属本页专属例外。 -->
        <p class="subtitle">选择界面语言 · Choose your language</p>
        <p class="hint">之后可在设置中随时切换 · You can change it anytime in Settings</p>

        <div class="options">
          <button type="button" class="option">
            <span class="option__main">中文</span>
            <span class="option__sub">简体中文界面</span>
            <span class="option__chevron" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m9 18 6-6-6-6"></path>
              </svg>
            </span>
          </button>

          <button type="button" class="option">
            <span class="option__main">English</span>
            <span class="option__sub">English interface</span>
            <span class="option__chevron" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m9 18 6-6-6-6"></path>
              </svg>
            </span>
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
