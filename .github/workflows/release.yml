name: Release

on:
  push:
    branches: [master]
    # 纯文档 / Markdown / .claude 配置改动不触发完整构建与版本递增;
    # 只要本次 push 含其它(代码等)改动,仍会照常触发。
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.claude/**'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build & publish continuous build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Bump patch version
        id: bump
        shell: bash
        run: |
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          sed -i "s/^version = .*/version = \"$NEW_VERSION\"/" src-tauri/Cargo.toml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: 发布自动递增版本号到 v${NEW_VERSION}"
          git push origin HEAD:master
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build Tauri app (NSIS installer)
        run: npm run tauri build

      - name: Collect build metadata
        id: meta
        shell: bash
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Package portable (no-install) build
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "src-tauri/target/release" -Filter "*.exe" -File | Select-Object -First 1
          $portableDir = "src-tauri/target/release/portable"
          New-Item -ItemType Directory -Path $portableDir | Out-Null
          Copy-Item $exe.FullName -Destination $portableDir
          Copy-Item "src-tauri/target/release/WebView2Loader.dll" -Destination $portableDir -ErrorAction SilentlyContinue
          Compress-Archive -Path "$portableDir/*" -DestinationPath "src-tauri/target/release/scoop-gui-portable-x64.zip"

      - name: Publish versioned release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.bump.outputs.version }}" \
            --title "v${{ steps.bump.outputs.version }} (${{ steps.meta.outputs.sha_short }})" \
            --notes "自动构建版本 v${{ steps.bump.outputs.version }},基于提交 ${{ steps.bump.outputs.sha }} 生成(版本号随每次 master 提交自动递增)。附带两种下载:NSIS 安装包(*-setup.exe)与免安装绿色版(scoop-gui-portable-x64.zip,解压后直接运行,需本机已装 WebView2 Runtime)。" \
            --target "${{ steps.bump.outputs.sha }}" \
            src-tauri/target/release/bundle/nsis/*.exe \
            src-tauri/target/release/scoop-gui-portable-x64.zip
