name: 功能建议
description: 为 scoopUI 提出新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 这个建议想解决什么场景 / 痛点?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 你希望如何实现?如涉及界面改动欢迎附草图或参考截图
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 是否考虑过其他实现方式,为何未采用
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: 补充信息
    validations:
      required: false
